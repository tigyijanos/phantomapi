services:
  phantomapi:
    build:
      context: .
      dockerfile: src/PhantomApi/Dockerfile
    container_name: phantomapi
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Phantom__CliCommand: codex
      Phantom__CliTimeoutSeconds: 300
    volumes:
      - ./data:/workspace/data
      - ./instructions:/workspace/instructions
      - ./AGENTS.md:/workspace/AGENTS.md
      - ./.codex:/root/.codex
    restart: unless-stopped
